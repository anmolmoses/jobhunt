services:
  jobhunt:
    build: .
    container_name: jobhunt
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - jobhunt-data:/app/data
      - jobhunt-uploads:/app/uploads
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    networks:
      - default
      - firecrawl_backend

volumes:
  jobhunt-data:
  jobhunt-uploads:

networks:
  firecrawl_backend:
    external: true
